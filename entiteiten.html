<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0c1e35">
<title>Entiteiten &amp; Netwerk</title>
<style>
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8fafc;--bg4:#f1f5f9;--border:#e2e8f0;--border2:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--topbar:#fff;--topbar-border:#e2e8f0;--modal-bg:#fff;--overlay:rgba(10,20,40,.6);--input-bg:#fff;--input-border:#cbd5e1;--shadow:rgba(0,0,0,.08);--accent:#3b82f6;--btn-edit-bg:#fff;--btn-edit-border:#cbd5e1;--btn-edit-text:#374151;--btn-del-bg:#fee2e2;--btn-del-border:#fca5a5;--btn-del-text:#7f1d1d;--badge-ok-bg:#dcfce7;--badge-ok-text:#14532d;--badge-ok-border:#86efac;--badge-err-bg:#fee2e2;--badge-err-text:#7f1d1d;--badge-err-border:#fca5a5;--badge-warn-bg:#fff7ed;--badge-warn-text:#7c2d12;--badge-warn-border:#fed7aa;--sb-bg:#0c1e35;--sb-text:#a8c8e0}
[data-theme="dark"]{--bg:#131c27;--bg2:#1c2839;--bg3:#1e2d3d;--bg4:#243347;--border:#2a3a4f;--border2:#2e4058;--text:#f1f5f9;--text2:#b8c8d8;--text3:#8aaac4;--topbar:#1c2839;--topbar-border:#2a3a4f;--modal-bg:#1c2839;--overlay:rgba(0,5,15,.75);--input-bg:#1e2d3d;--input-border:#2e4058;--shadow:rgba(0,0,0,.4);--accent:#60a5fa;--btn-edit-bg:#1e2d3d;--btn-edit-border:#2e4058;--btn-edit-text:#cbd5e1;--btn-del-bg:#2a1515;--btn-del-border:#7f1d1d;--btn-del-text:#fca5a5;--badge-ok-bg:#0d2e1a;--badge-ok-text:#86efac;--badge-ok-border:#166534;--badge-err-bg:#2d0f0f;--badge-err-text:#fca5a5;--badge-err-border:#7f1d1d;--badge-warn-bg:#2a1500;--badge-warn-text:#fdba74;--badge-warn-border:#92400e;--sb-bg:#0a1520;--sb-text:#7aaac8}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);transition:background .25s,color .25s;overflow:hidden;max-width:100vw;height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--topbar);border-bottom:1px solid var(--topbar-border);padding:9px 14px;padding-top:calc(9px + env(safe-area-inset-top));display:flex;align-items:center;gap:8px;flex-shrink:0;min-width:0;width:100%;z-index:40}
.tb-back{background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);padding:5px 10px;border-radius:6px;font-family:inherit;white-space:nowrap;flex-shrink:0}
.tb-back:hover{background:var(--bg3)}
.tb-dos{font-size:14px;font-weight:700;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--bg4);border:1px solid var(--border);padding:3px 9px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.tb-spacer{flex:1}
.theme-toggle{background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:5px 10px;font-size:11px;font-weight:700;color:var(--text2);font-family:inherit;white-space:nowrap;flex-shrink:0}
#sync-dot{font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;color:var(--text2)}
.wrap{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow:hidden}
.sb-filters{padding:10px 12px 6px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid var(--border);flex-shrink:0}
.chip{font-size:10px;font-weight:700;padding:4px 9px;border-radius:12px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.chip.on{color:#fff;border-color:transparent}
.chip .cdot{width:8px;height:8px;border-radius:50%}
.sb-list{flex:1;overflow-y:auto;padding:8px;min-height:0}
.ent-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:5px;border:1px solid transparent;transition:background .12s}
.ent-item:hover{background:var(--bg3)}
.ent-item.on{background:var(--bg4);border-color:var(--accent)}
.ent-av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800}
.ent-nm{flex:1;min-width:0;overflow:hidden}
.ent-nm-t{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ent-nm-s{font-size:10px;font-weight:600;color:var(--text3);text-transform:capitalize}
.sb-add{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.tabs{display:flex;gap:4px;padding:8px 12px 0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2)}
.tab{padding:8px 16px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;border-radius:6px 6px 0 0}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.pane{flex:1;min-height:0;overflow:hidden;display:none}
.pane.on{display:flex;flex-direction:column}
.detail-scroll{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.card-hd{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.card-ti{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}
.kvb{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.kvl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:2px}
.kvv{font-size:13px;font-weight:700;color:var(--text);word-break:break-word}
.el-row{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg3)}
.el-ic{font-size:18px;flex-shrink:0;line-height:1.3}
.el-bd{flex:1;min-width:0}
.el-actions{display:flex;gap:4px;flex-shrink:0}
.rel-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;background:var(--bg3);flex-wrap:wrap}
.rel-flow{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px;flex-wrap:wrap;flex:1;min-width:0}
.rel-lab{font-size:11px;font-weight:700;color:#fff;background:var(--accent);padding:2px 8px;border-radius:8px;white-space:nowrap}
.net-wrap{flex:1;position:relative;min-height:0;display:flex}
#net-canvas{flex:1;display:block;touch-action:none;cursor:grab}
.net-tools{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:6px;z-index:5}
.legend{position:absolute;left:10px;bottom:10px;background:rgba(12,30,53,.85);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:9px 11px;display:flex;flex-direction:column;gap:5px;z-index:5}
.legend-it{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:#dbe9f5;text-transform:capitalize}
.legend-it .lsw{width:12px;height:12px;border-radius:3px}
.empty{padding:40px 20px;text-align:center;color:var(--text3);font-size:13px;font-weight:600}
.ov{display:none;position:fixed;inset:0;background:var(--overlay);z-index:9000;align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.ob{background:var(--modal-bg);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.ob-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ob-ti{font-size:15px;font-weight:800;color:var(--text)}
.ob-x{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text3);line-height:1;padding:2px 6px}
.ob-bd{padding:16px 18px}
.ob-ft{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px}
.fld input,.fld select,.fld textarea{width:100%;padding:8px 10px;border:1.5px solid var(--input-border);border-radius:7px;background:var(--input-bg);color:var(--text);font-size:14px;font-family:inherit}
.fld textarea{resize:vertical;min-height:64px}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:none;border-color:var(--accent)}
.fld-row{display:flex;gap:10px;flex-wrap:wrap}
.fld-row>.fld{flex:1;min-width:120px}
.radios{display:flex;gap:8px;flex-wrap:wrap}
.radios label{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--text);border:1.5px solid var(--input-border);border-radius:7px;padding:7px 11px;cursor:pointer}
.radios input{width:auto}
.pt-toggle{display:flex;border:1.5px solid var(--input-border);border-radius:7px;overflow:hidden}
.pt-btn{flex:1;padding:8px 10px;border:none;background:var(--input-bg);color:var(--text2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;line-height:1.3}
.pt-btn.on{background:var(--accent);color:#fff}
.rp-tag{display:inline-block;font-size:9px;font-weight:700;background:#2563eb;color:#fff;border-radius:4px;padding:1px 5px;vertical-align:middle;margin-left:4px;text-transform:uppercase;letter-spacing:.04em}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#f1f5f9;padding:9px 18px;border-radius:10px;border-left:3px solid transparent;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.t-ok{border-left-color:#16a34a}#toast.t-err{border-left-color:#dc2626}#toast.t-warn{border-left-color:#f59e0b}
.btnW{cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border-radius:6px;padding:6px 12px;border:1.5px solid var(--btn-edit-border);background:var(--btn-edit-bg);color:var(--btn-edit-text);display:inline-flex;align-items:center;gap:5px;line-height:1;white-space:nowrap}
.btnB{cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border-radius:6px;padding:6px 12px;border:none;background:#2563eb;color:#fff;display:inline-flex;align-items:center;gap:5px;line-height:1;white-space:nowrap}
.btnR{cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border-radius:6px;padding:6px 12px;border:1.5px solid var(--btn-del-border);background:var(--btn-del-bg);color:var(--btn-del-text);display:inline-flex;align-items:center;gap:5px;line-height:1;white-space:nowrap}
.iW{cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border-radius:5px;padding:4px 8px;border:1.5px solid var(--btn-edit-border);background:var(--btn-edit-bg);color:var(--btn-edit-text);line-height:1}
.iR{cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;border-radius:5px;padding:4px 8px;border:1.5px solid var(--btn-del-border);background:var(--btn-del-bg);color:var(--btn-del-text);line-height:1}
@media(max-width:768px){
 .wrap{flex-direction:column}
 .tabs{display:none!important}
 .mob-nav{display:flex}
 .sb-list{padding-bottom:72px}
 .detail-scroll{padding-bottom:72px}
 .topbar{flex-wrap:wrap}
 .tb-tag{display:none}
 .topbar .btnW{display:none}
 .topbar .btnB{order:10;flex-basis:100%;justify-content:center;margin-top:2px}
 .fld input,.fld select,.fld textarea{font-size:16px!important;min-height:44px}
 .btnW,.btnB,.btnR{min-height:44px}
 .pt-toggle{flex-direction:column}
 .pt-btn{min-height:44px}
 .pt-btn+.pt-btn{border-top:1px solid var(--input-border)}
 .legend{bottom:calc(60px + env(safe-area-inset-bottom,0px))!important}
 .fld-row{flex-direction:column;gap:0}
}
#net-tooltip{position:absolute;pointer-events:none;z-index:10;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px;width:300px;max-height:72vh;overflow-y:auto;box-shadow:0 10px 32px rgba(0,0,0,.32);display:none}
#net-tooltip .tt-sec{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:10px 0 5px}
#net-tooltip .tt-sec:first-child{margin-top:0}
#net-tooltip .tt-row{display:flex;gap:6px;margin-bottom:3px;align-items:flex-start}
#net-tooltip .tt-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;min-width:78px;flex-shrink:0;padding-top:1px}
#net-tooltip .tt-val{font-size:11px;font-weight:600;color:var(--text);word-break:break-word}
#net-tooltip .tt-el{display:flex;gap:7px;align-items:flex-start;background:var(--bg3);border-radius:6px;padding:5px 8px;margin-bottom:4px}
#net-tooltip .tt-rel{font-size:11px;color:var(--text);background:var(--bg3);border-radius:6px;padding:5px 8px;margin-bottom:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
/* ===== Mobiele navigatiebalk ===== */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--topbar);border-top:1px solid var(--topbar-border);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px)}
.mob-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:10px 4px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--text2);font-size:10px;font-weight:700;min-height:54px;transition:color .15s}
.mob-btn .mb-ic{font-size:20px;line-height:1}
.mob-btn.on{color:var(--accent)}
/* ===== Mobiele FAB (+ Entiteit) ===== */
.mob-fab{display:none;position:fixed;right:16px;bottom:calc(64px + env(safe-area-inset-bottom,0px));width:52px;height:52px;border-radius:50%;background:#2563eb;color:#fff;border:none;font-size:26px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.45);z-index:90;line-height:1;font-weight:400}
</style>
</head>
<body>
<div class="topbar">
  <button class="tb-back" onclick="goBack()">&#8592; Terug</button>
  <span class="tb-dos" id="dos-naam">Dossier</span>
  <span class="tb-tag">&#128376;&#65039; Entiteiten</span>
  <span class="tb-spacer"></span>
  <span id="sync-dot">&#9679; Verbinden...</span>
  <button class="btnW" onclick="exportWord()">&#128228; Export Word</button>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">&#9728; Licht</button>
</div>
<div class="wrap">
  <div class="sidebar">
    <div class="sb-filters" id="filters"></div>
    <div class="sb-list" id="ent-list"></div>
    <div class="sb-add"><button class="btnB" style="width:100%;justify-content:center" onclick="openEntModal(null)">+ Entiteit</button></div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab on" id="tab-detail" onclick="switchTab('detail')">&#128203; Detail</button>
      <button class="tab" id="tab-net" onclick="switchTab('net')">&#128376;&#65039; Netwerk</button>
    </div>
    <div class="pane on" id="pane-detail">
      <div class="detail-scroll" id="detail"></div>
    </div>
    <div class="pane" id="pane-net">
      <div class="net-wrap">
        <canvas id="net-canvas"></canvas>
        <div id="net-tooltip"></div>
        <input type="file" id="foto-input" accept="image/*" style="display:none">
        <div class="net-tools">
          <button class="btnW" onclick="resetPositions()">&#8635; Herpositioneren</button>
          <button class="btnW" onclick="resizeCanvas();drawNet();fitView();drawNet()">&#10697; Centreren</button>
        </div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  </div>
</div>

<!-- Mobiele navigatiebalk -->
<div class="mob-nav" id="mob-nav">
  <button class="mob-btn" id="mb-lijst" onclick="mobSwitch('lijst')"><span class="mb-ic">&#9776;</span>Lijst</button>
  <button class="mob-btn" id="mb-detail" onclick="mobSwitch('detail')"><span class="mb-ic">&#128203;</span>Detail</button>
  <button class="mob-btn" id="mb-netwerk" onclick="mobSwitch('netwerk')"><span class="mb-ic">&#128376;&#65039;</span>Netwerk</button>
</div>

<!-- Mobiele FAB -->
<button class="mob-fab" id="mob-fab" onclick="openEntModal(null)" title="Entiteit toevoegen">+</button>

<!-- Entiteit modal -->
<div class="ov" id="mo-ent">
  <div class="ob" onclick="event.stopPropagation()">
    <div class="ob-hd"><span class="ob-ti" id="mo-ent-ti">Entiteit</span><button class="ob-x" onclick="CM('mo-ent')">&times;</button></div>
    <div class="ob-bd">
      <div class="fld">
        <label>Persoontype</label>
        <div class="pt-toggle">
          <button id="pt-nat" class="pt-btn on" onclick="setPersoonType('natuurlijk')">&#128100; Natuurlijk persoon</button>
          <button id="pt-rp" class="pt-btn" onclick="setPersoonType('rechtspersoon')">&#127970; Rechtspersoon</button>
          <button id="pt-onb" class="pt-btn" onclick="setPersoonType('onbekend')">&#10067; Onbekende</button>
        </div>
      </div>
      <!-- Onbekende velden -->
      <div id="e-onb-fields" style="display:none">
        <div class="fld"><label>Omschrijving (optioneel)</label><input id="e-alias" type="text" placeholder="bv. Onbekende man, Persoon A..." autocomplete="off"></div>
      </div>
      <!-- Natuurlijk persoon velden -->
      <div id="e-nat-fields">
        <div class="fld-row">
          <div class="fld"><label>Familienaam</label><input id="e-fam" type="text" autocomplete="off" oninput="this.value=this.value.toUpperCase()"></div>
          <div class="fld"><label>Voornaam</label><input id="e-voor" type="text" autocomplete="off"></div>
        </div>
        <div class="fld-row">
          <div class="fld"><label>Geboortedatum</label><input id="e-gb" type="date"></div>
          <div class="fld"><label>Rijksregister</label><input id="e-rr" type="text" placeholder="85.03.15-001.23" autocomplete="off" maxlength="15" oninput="fmtRR(this)"></div>
        </div>
      </div>
      <!-- Rechtspersoon velden -->
      <div id="e-rp-fields" style="display:none">
        <div class="fld"><label>Naam / handelsnaam *</label><input id="e-bnaam" type="text" autocomplete="off"></div>
        <div class="fld"><label>KBO-nummer</label><input id="e-kbo" type="text" placeholder="0xxx.xxx.xxx" autocomplete="off"></div>
        <div class="fld"><label>Adres</label><input id="e-adres" type="text" autocomplete="off"></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label>Rol</label><select id="e-type" onchange="entTypeChange()"></select></div>
        <div class="fld" id="e-anders-wrap" style="display:none"><label>Rol (anders)</label><input id="e-anders" type="text" autocomplete="off"></div>
      </div>
      <div class="fld"><label>Notities</label><textarea id="e-not"></textarea></div>
    </div>
    <div class="ob-ft"><button class="btnW" onclick="CM('mo-ent')">Annuleren</button><button class="btnB" onclick="saveEnt()">Opslaan</button></div>
  </div>
</div>

<!-- Element modal -->
<div class="ov" id="mo-el">
  <div class="ob" onclick="event.stopPropagation()">
    <div class="ob-hd"><span class="ob-ti" id="mo-el-ti">Element</span><button class="ob-x" onclick="CM('mo-el')">&times;</button></div>
    <div class="ob-bd">
      <div class="fld-row">
        <div class="fld"><label>Type</label><select id="el-type" onchange="elTypeChange()"></select></div>
        <div class="fld" id="el-anders-wrap" style="display:none"><label>Type (anders)</label><input id="el-anders" type="text" autocomplete="off"></div>
      </div>
      <!-- Generiek waarde (voor adres, email, andere) -->
      <div id="el-gen-wrap">
        <div class="fld"><label>Waarde</label><input id="el-waarde" type="text" autocomplete="off"></div>
      </div>
      <!-- Voertuig -->
      <div id="el-vrt-wrap" style="display:none">
        <div class="fld-row">
          <div class="fld"><label>Kenteken</label><input id="el-kenteken" type="text" autocomplete="off" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
          <div class="fld"><label>Kleur</label><input id="el-kleur" type="text" autocomplete="off" placeholder="bv. zwart, rood..."></div>
        </div>
        <div class="fld-row">
          <div class="fld"><label>Merk</label><input id="el-merk" type="text" autocomplete="off" placeholder="bv. BMW, Volkswagen..."></div>

/* ===== Helpers ===== */
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function entName(e){if(!e)return '?';if(e.persoonType==='rechtspersoon')return (e.bedrijfsnaam||'').trim()||'Naamloos bedrijf';if(e.persoonType==='onbekend')return (e.alias||'').trim()||'Onbekende';var n=((e.voornaam||'')+' '+(e.familienaam||'')).trim();return n||'Naamloos';}
function entInitials(e){if(!e)return '?';if(e.persoonType==='rechtspersoon'){var b=(e.bedrijfsnaam||'').trim();return b?b[0].toUpperCase():'B';}if(e.persoonType==='onbekend')return '?';var v=(e.voornaam||'').trim(),f=(e.familienaam||'').trim();var i=(v?v[0]:'')+(f?f[0]:'');if(!i)i=(entName(e)[0]||'?');return i.toUpperCase();}
function elSummary(el){
  if(!el)return '—';
  if(el.type==='voertuig'){var p=[el.kenteken,el.merk,el.model].filter(Boolean);return p.length?p.join(' '):(el.waarde||'—');}

  if(el.type==='bankrekening')return [el.iban||el.waarde,el.banknaam,el.bankland].filter(Boolean).join(' · ');
  if(el.type==='sociale_media')return [el.smplatform,el.smprofiel||el.waarde].filter(Boolean).join(': ');
  return el.waarde||'—';
}
function elSummaryShort(el){var s=elSummary(el);return s.length>15?s.slice(0,14)+'…':s;}
function elNetLabel(el){if(!el)return '';var s='';if(el.type==='voertuig')s=el.kenteken||el.waarde||'';else if(el.type==='telefoon')s=el.telnr||el.waarde||'';else if(el.type==='bankrekening')s=el.iban||el.waarde||'';else if(el.type==='sociale_media')s=el.smprofiel||el.waarde||'';else s=el.waarde||'';return s.length>14?s.slice(0,13)+'…':s;}
function entColor(e){return TYPES[e.type]||TYPES.andere;}

function fmtRR(el){var pos=el.selectionStart,old=el.value,d=old.replace(/\D/g,'').slice(0,11),r='';if(d.length>0)r+=d.slice(0,2);if(d.length>2)r+='.'+d.slice(2,4);if(d.length>4)r+='.'+d.slice(4,6);if(d.length>6)r+='-'+d.slice(6,9);if(d.length>9)r+='.'+d.slice(9,11);el.value=r;var bc=old.slice(0,pos).replace(/\D/g,'').length,np=0,dc=0;for(var i=0;i<r.length;i++){if(dc>=bc)break;if(/\d/.test(r[i]))dc++;np=i+1;}el.setSelectionRange(np,np);}

function initFB(){

        var oc2=oc.getContext('2d');

/* ===== Netwerk canvas ===== */
var NODES={}, NET_SCALE=1, NET_OX=0, NET_OY=0;
var canvas=document.getElementById('net-canvas'), ctx=canvas.getContext('2d');
var dragNode=null,dragDX=0,dragDY=0,dragElOffsets={},panning=false,panSX=0,panSY=0,panOX=0,panOY=0,DPR=window.devicePixelRatio||1;
var hoverNode=null,_pinchDist=null;
var IMG_CACHE={};

function resizeCanvas(){
  var r=canvas.getBoundingClientRect();
  if(r.width<2||r.height<2)return;
  DPR=window.devicePixelRatio||1;
  canvas.width=r.width*DPR;canvas.height=r.height*DPR;
}
function visibleCanvasSize(){
  var r=canvas.getBoundingClientRect();
  var cw=r.width,ch=r.height;
  var nav=document.getElementById('mob-nav');
  if(isMob()&&nav&&nav.offsetHeight)ch=Math.max(100,ch-nav.offsetHeight);
  return {w:cw,h:ch};
}
function fitView(){
  var keys=Object.keys(NODES);if(!keys.length)return;
  var vc=visibleCanvasSize();var cw=vc.w,ch=vc.h;if(cw<2||ch<2)return;
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  keys.forEach(function(k){var n=NODES[k];if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;});
  var pad=80;var bw=Math.max(1,maxX-minX)+pad*2,bh=Math.max(1,maxY-minY)+pad*2;
  var sc=Math.min(cw/bw,ch/bh,1.5);
  NET_SCALE=sc;NET_OX=cw/2-(minX+maxX)/2*sc;NET_OY=ch/2-(minY+maxY)/2*sc;
}
function circlePositions(){
  var ids=entsArr().map(function(e){return e.id;});
  var vc=visibleCanvasSize();
  var cx=(vc.w||300)/2,cy=(vc.h||300)/2;
  var rad=Math.max(80,Math.min(cx,cy)-70);
  ids.forEach(function(id,i){
    var ang=(i/Math.max(1,ids.length))*Math.PI*2-Math.PI/2;
    NODES[id]={x:cx+Math.cos(ang)*rad,y:cy+Math.sin(ang)*rad};
  });
}
function syncNodes(){
  var ids=entsArr().map(function(e){return e.id;});
  // verwijder verdwenen entiteit-nodes en hun element-nodes
  Object.keys(NODES).forEach(function(k){
    if(k.indexOf('el:')===0){var eid=k.split(':')[1];if(ids.indexOf(eid)===-1)delete NODES[k];}
    else{if(ids.indexOf(k)===-1)delete NODES[k];}
  });
  // verwijder element-nodes waarvan het type niet meer bestaat in de entiteit
  entsArr().forEach(function(e){
    var typeSet={};(e.elementen||[]).forEach(function(el){typeSet[el.type]=true;});
    Object.keys(NODES).forEach(function(k){
      if(k.indexOf('el:'+e.id+':')===0&&!typeSet[k.split(':')[2]])delete NODES[k];
    });
  });
  var entKeys=Object.keys(NODES).filter(function(k){return k.indexOf('el:')!==0;});
  var newOnes=ids.filter(function(id){return !NODES[id];});
  if(entKeys.length===0){
    var hasSaved=newOnes.some(function(id){var e=ENTS[id];return e&&typeof e.x==='number';});
    if(!hasSaved){circlePositions();return;}
  }
  if(newOnes.length){
    var r=canvas.getBoundingClientRect();var cx=(r.width||600)/2,cy=(r.height||400)/2;
    newOnes.forEach(function(id){var e=ENTS[id];if(e&&typeof e.x==='number'){NODES[id]={x:e.x,y:e.y};}else{NODES[id]={x:cx+(Math.random()-0.5)*200,y:cy+(Math.random()-0.5)*200};}});
  }
  // laad opgeslagen type-groepposities (eerste element van elk type met opgeslagen positie)
  entsArr().forEach(function(e){
    var typeFirst={};
    (e.elementen||[]).forEach(function(el){if(!typeFirst[el.type])typeFirst[el.type]=el;});
    Object.keys(typeFirst).forEach(function(t){
      var key='el:'+e.id+':'+t;
      var first=typeFirst[t];
      if(!NODES[key]&&typeof first.netX==='number')NODES[key]={x:first.netX,y:first.netY};
    });
  });
}
function resetPositions(){circlePositions();fitView();drawNet();toast('✓ Herpositioneerd');}
function netZoom(f){NET_SCALE=Math.max(0.3,Math.min(3,NET_SCALE*f));drawNet();}

function drawNet(targetCtx,scaleOverride){
  var c=targetCtx||ctx;
  var w=canvas.width,h=canvas.height;
  c.save();
  c.setTransform(1,0,0,1,0,0);
  c.fillStyle=CANVAS_BG;c.fillRect(0,0,w,h);
  var dpr=DPR;
  c.setTransform(dpr*NET_SCALE,0,0,dpr*NET_SCALE,NET_OX*dpr,NET_OY*dpr);
  // relations
  relsArr().forEach(function(r){
    var a=NODES[r.vanEntiteitId],b=NODES[r.naarEntiteitId];
    if(!a||!b)return;
    drawEdge(c,a,b,r);
  });
  // nodes
  entsArr().forEach(function(e){
    var n=NODES[e.id];if(!n)return;
    drawNode(c,n,e);
  });
  // Elementen als verplaatsbare subnodes — gegroepeerd per type
  var R_EL=16,EL_DIST=80;
  entsArr().forEach(function(e){
    var en=NODES[e.id];if(!en)return;
    var els=(e.elementen||[]);if(!els.length)return;
    var typeGroups={},typeOrder=[];
    els.forEach(function(el){
      if(!typeGroups[el.type]){typeGroups[el.type]=[];typeOrder.push(el.type);}
      typeGroups[el.type].push(el);
    });
    var count=typeOrder.length;
    typeOrder.forEach(function(t,gi){
      var key='el:'+e.id+':'+t;
      if(!NODES[key]){var angle=(gi/Math.max(1,count))*Math.PI*2-Math.PI/2;NODES[key]={x:en.x+Math.cos(angle)*EL_DIST,y:en.y+Math.sin(angle)*EL_DIST};}
      var group=typeGroups[t];
      var ex=NODES[key].x,ey=NODES[key].y;
      var dx=ex-en.x,dy=ey-en.y,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
      c.save();c.setLineDash([4,3]);c.strokeStyle='rgba(148,163,184,.35)';c.lineWidth=1;
      c.beginPath();c.moveTo(en.x+ux*38,en.y+uy*38);c.lineTo(ex-ux*R_EL,ey-uy*R_EL);c.stroke();
      c.setLineDash([]);c.restore();
      c.beginPath();c.arc(ex,ey,R_EL,0,Math.PI*2);
      c.fillStyle='rgba(15,30,55,0.88)';c.fill();
      c.lineWidth=1;c.strokeStyle='rgba(148,163,184,.45)';c.stroke();
      c.textAlign='center';c.textBaseline='middle';
      c.font='10px sans-serif';c.fillStyle='rgba(203,213,225,.9)';
      c.fillText(EL_ICONS[t]||'📎',ex,ey);
      if(group.length>1){
        c.save();
        c.beginPath();c.arc(ex+R_EL-4,ey-R_EL+4,7,0,Math.PI*2);
        c.fillStyle='#3b82f6';c.fill();
        c.font='bold 7px sans-serif';c.fillStyle='#fff';c.textAlign='center';c.textBaseline='middle';
        c.fillText(group.length,ex+R_EL-4,ey-R_EL+4);
        c.restore();
      }
      c.font='500 7.5px -apple-system,Segoe UI,sans-serif';c.fillStyle='rgba(148,163,184,.80)';
      c.textAlign='center';c.textBaseline='top';
      var maxShow=3;
      group.slice(0,maxShow).forEach(function(el,li){
        c.fillText(elNetLabel(el),ex,ey+R_EL+3+li*10);
      });
      if(group.length>maxShow){
        c.fillStyle='rgba(148,163,184,.50)';
        c.fillText('+'+(group.length-maxShow)+' meer',ex,ey+R_EL+3+maxShow*10);
      }
    });
  });
  c.setLineDash([]);
  c.restore();
}
function drawEdge(c,a,b,r){
  var R=38;
  var dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1;
  var ux=dx/len,uy=dy/len;
  var ax=a.x+ux*R,ay=a.y+uy*R,bx=b.x-ux*R,by=b.y-uy*R;
  c.strokeStyle='#5b7a99';c.lineWidth=2;
  c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);c.stroke();
  if(r.richting==='AB'||r.richting==='beide')arrowHead(c,ax,ay,bx,by);
  if(r.richting==='BA'||r.richting==='beide')arrowHead(c,bx,by,ax,ay);
  if(r.label){
    var lx=(ax+bx)/2,ly=(ay+by)/2-18;
    c.font='700 12px -apple-system,Segoe UI,sans-serif';
    var tw=c.measureText(r.label).width;
    c.fillStyle='rgba(12,30,53,.92)';
    c.fillRect(lx-tw/2-6,ly-9,tw+12,18);
    c.fillStyle='#dbe9f5';c.textAlign='center';c.textBaseline='middle';
    c.fillText(r.label,lx,ly);
  }
}
function arrowHead(c,fromx,fromy,tox,toy){
  var ang=Math.atan2(toy-fromy,tox-fromx),s=11;
  c.fillStyle='#5b7a99';
  c.beginPath();c.moveTo(tox,toy);
  c.lineTo(tox-s*Math.cos(ang-Math.PI/6),toy-s*Math.sin(ang-Math.PI/6));
  c.lineTo(tox-s*Math.cos(ang+Math.PI/6),toy-s*Math.sin(ang+Math.PI/6));
  c.closePath();c.fill();
}
var FOTO_RW=36,FOTO_RH=48,FOTO_CR=6;
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}
function drawNode(c,n,e){
  var R=38;
  var cached=e.foto&&IMG_CACHE[e.id];
  if(e.foto){
    var RW=FOTO_RW,RH=FOTO_RH,CR=FOTO_CR,pad=4;
    var col=entColor(e);
    // gekleurde rand (pad px breed zichtbaar rondom foto)
    roundRect(c,n.x-RW,n.y-RH,RW*2,RH*2,CR);
    c.fillStyle=col;c.fill();
    c.lineWidth=1.5;c.strokeStyle='rgba(255,255,255,.25)';c.stroke();
    if(cached&&cached.loaded){
      c.save();
      roundRect(c,n.x-RW+pad,n.y-RH+pad,RW*2-pad*2,RH*2-pad*2,CR-2);c.clip();
      c.drawImage(cached.img,n.x-RW+pad,n.y-RH+pad,RW*2-pad*2,RH*2-pad*2);
      // categorie-tag onderaan foto
      var lh=14;
      c.globalAlpha=0.88;c.fillStyle=col;
      c.fillRect(n.x-RW+pad,n.y+RH-pad-lh,RW*2-pad*2,lh);
      c.globalAlpha=1;
      c.fillStyle='#fff';c.font='bold 7px -apple-system,Segoe UI,sans-serif';
      c.textAlign='center';c.textBaseline='middle';
      c.fillText(typeLabel(e).toUpperCase(),n.x,n.y+RH-pad-lh/2);
      c.restore();
    }else{
      if(!cached)ensureFotoLoaded(e);
      c.textAlign='center';c.textBaseline='middle';
      c.fillStyle='rgba(255,255,255,.6)';c.font='800 15px -apple-system,Segoe UI,sans-serif';
      c.fillText(entInitials(e),n.x,n.y);
    }
    var nm=entName(e);if(nm.length>18)nm=nm.slice(0,17)+'…';
    c.font='600 11px -apple-system,Segoe UI,sans-serif';c.fillStyle='#cfe0f0';c.textBaseline='top';c.textAlign='center';
    c.fillText(nm,n.x,n.y+RH+5);
  }else{
    c.beginPath();c.arc(n.x,n.y,R,0,Math.PI*2);
    c.fillStyle=entColor(e);c.fill();
    c.lineWidth=3;
    if(e.persoonType==='onbekend'){c.setLineDash([6,4]);c.strokeStyle='rgba(255,255,255,.55)';}
    else{c.setLineDash([]);c.strokeStyle='rgba(255,255,255,.85)';}
    c.stroke();c.setLineDash([]);
    c.textAlign='center';c.textBaseline='middle';
    if(e.persoonType==='rechtspersoon'){
      c.font='24px sans-serif';c.fillText('🏢',n.x,n.y+1);
    }else if(e.persoonType==='onbekend'){
      c.fillStyle='rgba(255,255,255,.65)';c.font='800 22px -apple-system,Segoe UI,sans-serif';c.fillText('?',n.x,n.y);
    }else{
      c.fillStyle='#fff';c.font='800 16px -apple-system,Segoe UI,sans-serif';c.fillText(entInitials(e),n.x,n.y);
    }
    var nm=entName(e);if(nm.length>18)nm=nm.slice(0,17)+'…';
    c.font='600 11px -apple-system,Segoe UI,sans-serif';c.fillStyle='#cfe0f0';c.textBaseline='top';
    c.fillText(nm,n.x,n.y+R+5);
  }
}
function ensureFotoLoaded(e){
  if(IMG_CACHE[e.id]&&IMG_CACHE[e.id].src===e.foto)return;
  var obj={src:e.foto,loaded:false,img:new Image()};
  IMG_CACHE[e.id]=obj;
  obj.img.onload=function(){obj.loaded=true;drawNet();};
  obj.img.src=e.foto;
}

function evtPos(ev){var r=canvas.getBoundingClientRect();var cx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;var cy=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;return {x:(cx-NET_OX)/NET_SCALE,y:(cy-NET_OY)/NET_SCALE};}
function hitNode(p){
  var found=null;
  entsArr().forEach(function(e){
    var n=NODES[e.id];if(!n)return;
    if(e.foto){if(Math.abs(p.x-n.x)<=FOTO_RW&&Math.abs(p.y-n.y)<=FOTO_RH)found=e.id;}
    else{if(Math.hypot(p.x-n.x,p.y-n.y)<=38)found=e.id;}
  });
  if(found)return found;
  entsArr().forEach(function(e){
    var types=[];(e.elementen||[]).forEach(function(el){if(types.indexOf(el.type)===-1)types.push(el.type);});
    types.forEach(function(t){var key='el:'+e.id+':'+t;var n=NODES[key];if(n&&Math.hypot(p.x-n.x,p.y-n.y)<=16)found=key;});
  });
  return found;
}
function onDown(ev){
  if(ev.touches&&ev.touches.length===2){
    dragNode=null;panning=false;
    _pinchDist=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    ev.preventDefault();return;
  }
  var p=evtPos(ev);var id=hitNode(p);
  hideTooltip();hoverNode=null;
  if(id){
    dragNode=id;dragDX=p.x-NODES[id].x;dragDY=p.y-NODES[id].y;canvas.style.cursor='grabbing';
    dragElOffsets={};
    if(id.indexOf('el:')!==0){
      var eid=id;
      var types=[];((ENTS[eid]&&ENTS[eid].elementen)||[]).forEach(function(el){if(types.indexOf(el.type)===-1)types.push(el.type);});
      types.forEach(function(t){var key='el:'+eid+':'+t;if(NODES[key])dragElOffsets[key]={dx:NODES[key].x-NODES[eid].x,dy:NODES[key].y-NODES[eid].y};});
    }
  }else{
    panning=true;var r=canvas.getBoundingClientRect();panSX=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;panSY=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;panOX=NET_OX;panOY=NET_OY;
  }
  if(ev.touches)ev.preventDefault();
}
function onMove(ev){
  if(ev.touches&&ev.touches.length===2){
    panning=false;dragNode=null;
    var newDist=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    if(_pinchDist===null){_pinchDist=newDist;ev.preventDefault();return;}
    var r=canvas.getBoundingClientRect();
    var mx=(ev.touches[0].clientX+ev.touches[1].clientX)/2-r.left;
    var my=(ev.touches[0].clientY+ev.touches[1].clientY)/2-r.top;
    var factor=newDist/_pinchDist;
    var newScale=Math.max(0.2,Math.min(4,NET_SCALE*factor));
    NET_OX=mx-(mx-NET_OX)*(newScale/NET_SCALE);
    NET_OY=my-(my-NET_OY)*(newScale/NET_SCALE);
    NET_SCALE=newScale;
    _pinchDist=newDist;
    drawNet();ev.preventDefault();return;
  }
  if(dragNode){
    var p=evtPos(ev);
    var nx=p.x-dragDX,ny=p.y-dragDY;
    NODES[dragNode]={x:nx,y:ny};
    if(dragNode.indexOf('el:')!==0){
      Object.keys(dragElOffsets).forEach(function(k){NODES[k]={x:nx+dragElOffsets[k].dx,y:ny+dragElOffsets[k].dy};});
    }
    drawNet();if(ev.touches)ev.preventDefault();
  }else if(panning){
    var r=canvas.getBoundingClientRect();var mx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left,my=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;NET_OX=panOX+(mx-panSX);NET_OY=panOY+(my-panSY);drawNet();if(ev.touches)ev.preventDefault();
  }else if(!ev.touches){
    var p=evtPos(ev);
    var hit=hitNode(p);
    var hovEnt=hit&&hit.indexOf('el:')!==0?hit:null;
    canvas.style.cursor=hit?'pointer':'grab';
    if(hovEnt!==hoverNode){hoverNode=hovEnt;if(hovEnt)showTooltip(hovEnt);else hideTooltip();}
  }
}
function onUp(){
  if(dragNode){
    if(dragNode.indexOf('el:')===0){
      var parts=dragNode.split(':'),eid=parts[1],typ=parts[2];
      var e=ENTS[eid];
      if(e&&e.elementen){
        e.elementen.forEach(function(el){if(el.type===typ){el.netX=NODES[dragNode].x;el.netY=NODES[dragNode].y;}});
        saveEntData(eid);
      }
    }else{
      if(ENTS[dragNode]){
        ENTS[dragNode].x=NODES[dragNode].x;ENTS[dragNode].y=NODES[dragNode].y;
        var e=ENTS[dragNode];
        if(e.elementen){
          var types=[];e.elementen.forEach(function(el){if(types.indexOf(el.type)===-1)types.push(el.type);});
          types.forEach(function(t){var k='el:'+dragNode+':'+t;if(NODES[k])e.elementen.forEach(function(el){if(el.type===t){el.netX=NODES[k].x;el.netY=NODES[k].y;}});});
        }
        saveEntData(dragNode);
      }
    }
  }
  dragNode=null;dragElOffsets={};panning=false;_pinchDist=null;canvas.style.cursor='grab';
}

function showTooltip(eid){

function hideTooltip(){var tt=document.getElementById('net-tooltip');if(tt)tt.style.display='none';}
function positionTooltip(eid){
  var tt=document.getElementById('net-tooltip');if(!tt||tt.style.display==='none')return;
  var n=NODES[eid];if(!n)return;
  var wr=canvas.parentElement.getBoundingClientRect();
  var e=ENTS[eid];
  var nodeR=(e&&e.foto?FOTO_RW:38)*NET_SCALE;
  var sx=n.x*NET_SCALE+NET_OX, sy=n.y*NET_SCALE+NET_OY;
  var tw=tt.offsetWidth||300, th=tt.offsetHeight||200;
  var GAP=14;
  var mx=sx+nodeR+GAP, my=sy-th/2;
  if(mx+tw>wr.width-6){mx=sx-nodeR-tw-GAP;}
  if(my<6)my=6;
  if(my+th>wr.height-6)my=wr.height-th-6;
  if(mx<6)mx=6;
  tt.style.left=mx+'px';tt.style.top=my+'px';
}

function dataUrlToBytes(dataUrl){var b64=dataUrl.split(',')[1];var bin=atob(b64);var bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes;}
function P(text,opts){opts=opts||{};return new docx.Paragraph({children:[new docx.TextRun({text:text==null?'':String(text),color:opts.color,bold:opts.bold,size:opts.size})],alignment:opts.align,spacing:opts.spacing});}
function cell(text,opts){opts=opts||{};return new docx.TableCell({shading:opts.fill?{type:docx.ShadingType.SOLID,fill:opts.fill,color:opts.fill}:undefined,children:[P(text,{color:opts.color,bold:opts.bold,size:opts.size})],width:opts.width?{size:opts.width,type:docx.WidthType.PERCENTAGE}:undefined});}

function exportWord(){
  if(typeof docx==='undefined'){toast('❌ Word-bibliotheek niet geladen');return;}
  toast('Word genereren...');
  try{
    var children=[];
    // 1. Titel
    children.push(new docx.Table({width:{size:100,type:docx.WidthType.PERCENTAGE},rows:[new docx.TableRow({children:[new docx.TableCell({shading:{type:docx.ShadingType.SOLID,fill:'0C1E35',color:'0C1E35'},margins:{top:200,bottom:200,left:200,right:200},children:[
      new docx.Paragraph({children:[new docx.TextRun({text:DNAAM,bold:true,color:'FFFFFF',size:36})]}),
      new docx.Paragraph({children:[new docx.TextRun({text:'Entiteiten & Netwerk',color:'9DC3E6',size:26})]}),
      new docx.Paragraph({children:[new docx.TextRun({text:'Geexporteerd op '+new Date().toLocaleDateString('nl-BE'),color:'9DC3E6',size:20})]})
    ]})]})]}));
    children.push(P(''));
    // 2. Netwerkafbeelding (hoge resolutie)
    var imgRun=buildNetImage();
    if(imgRun){children.push(P('Netwerkgraf',{bold:true,size:26}));children.push(new docx.Paragraph({children:[imgRun]}));children.push(P(''));}
    // 3. Legende
    children.push(P('Legende',{bold:true,size:24}));
    children.push(tbl([headerRow(['Kleur','Type'])].concat(Object.keys(TYPES).map(function(t){
      return new docx.TableRow({children:[cell('     ',{fill:TYPES[t].replace('#','')}),cell(TYPE_LABELS[t])]});
    }))));
    children.push(P(''));
    // 4. Entiteitentabel
    children.push(P('Entiteiten',{bold:true,size:24}));
    var entRows=[headerRow(['Naam','Type','Geboortedatum','Rijksregister','Notities'])];
    entsArr().forEach(function(e,i){
      var fill=i%2?'EAF1F8':'FFFFFF';
      entRows.push(new docx.TableRow({children:[
        cell(entName(e),{fill:fill,bold:true}),cell(typeLabel(e),{fill:fill}),cell(fd(e.geboortedatum),{fill:fill}),cell(e.rijksregister||'-',{fill:fill}),cell(e.notities||'-',{fill:fill})
      ]}));
    });
    children.push(tbl(entRows));
    children.push(P(''));
    // 5. Per entiteit elementen
    entsArr().forEach(function(e){
      var els=elsOf(e.id);
      if(!els.length)return;
      children.push(P(entName(e)+' — Elementen',{bold:true,size:22}));
      var rows=[headerRow(['Type','Waarde','Notitie'])];
      sortedEls(els).forEach(function(item,i){var el=item.el;
        var fill=i%2?'EAF1F8':'FFFFFF';
        var lbl=(el.type==='andere'&&el.typeAnders)?el.typeAnders:(EL_LABELS[el.type]||'Andere');
        rows.push(new docx.TableRow({children:[cell(lbl,{fill:fill}),cell(elSummary(el)||'-',{fill:fill}),cell(el.notitie||'-',{fill:fill})]}));
      });
      children.push(tbl(rows));
      children.push(P(''));
    });
    // 6. Relatietabel
    if(relsArr().length){
      children.push(P('Relaties',{bold:true,size:24}));
      var relRows=[headerRow(['Entiteit A','Relatie','Richting','Entiteit B'])];
      relsArr().forEach(function(r,i){
        var fill=i%2?'EAF1F8':'FFFFFF';
        var a=ENTS[r.vanEntiteitId],b=ENTS[r.naarEntiteitId];
        var dir=r.richting==='beide'?'Beide':(r.richting==='BA'?'B -> A':'A -> B');
        relRows.push(new docx.TableRow({children:[cell(a?entName(a):'?',{fill:fill}),cell(r.label||'-',{fill:fill}),cell(dir,{fill:fill}),cell(b?entName(b):'?',{fill:fill})]}));
      });
      children.push(tbl(relRows));
    }
    var doc=new docx.Document({sections:[{children:children}]});
    docx.Packer.toBlob(doc).then(function(blob){
      var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;
      a.download='Entiteiten_'+(DNAAM.replace(/[^a-z0-9]+/gi,'_'))+'.docx';
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},1000);
      toast('✓ Word geexporteerd');
    }).catch(function(e){console.warn(e);toast('❌ Export mislukt');});
  }catch(e){console.warn(e);toast('❌ Export mislukt');}
}

function buildNetImage(){
  if(!entsArr().length)return null;
  // Offscreen op hoge resolutie, met alle nodes in beeld
  var pad=70,minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  entsArr().forEach(function(e){var n=NODES[e.id];if(!n)return;minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x);maxY=Math.max(maxY,n.y);});
  if(minX>maxX){return null;}
  var R=38;minX-=R+pad;minY-=R+pad;maxX+=R+pad;maxY+=R+pad+24;
  var w=Math.max(300,maxX-minX),h=Math.max(200,maxY-minY);
  var scale=2;
  var off=document.createElement('canvas');off.width=w*scale;off.height=h*scale;
  var oc=off.getContext('2d');
  oc.setTransform(scale,0,0,scale,-minX*scale,-minY*scale);
  oc.fillStyle=CANVAS_BG;oc.fillRect(minX,minY,w,h);
  relsArr().forEach(function(r){var a=NODES[r.vanEntiteitId],b=NODES[r.naarEntiteitId];if(a&&b)drawEdge(oc,a,b,r);});
  entsArr().forEach(function(e){var n=NODES[e.id];if(n)drawNode(oc,n,e);});
  var dataUrl=off.toDataURL('image/png');
  var bytes=dataUrlToBytes(dataUrl);
  var dispW=Math.min(620,w),dispH=dispW*(h/w);
  return new docx.ImageRun({data:bytes,transformation:{width:Math.round(dispW),height:Math.round(dispH)}});
}

if(!DID){toast('❌ Geen dossier opgegeven');}
initFB();
renderAll();
(function waitFb(t){t=t||0;if(window._fbLoadErr||t>30){return;}if(typeof firebase==='undefined'){setTimeout(function(){waitFb(t+1);},100);}})();
