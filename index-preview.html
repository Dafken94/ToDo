<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<meta name="theme-color" content="#0c1e35">
<link rel="manifest" href="manifest.json">

<title>Mijn Dossiers</title>
<style>
:root{--bg:#f0f2f5;--bg2:#fff;--bg3:#f8fafc;--bg4:#f1f5f9;--border:#e2e8f0;--border2:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#64748b;--sb-bg:#0c1e35;--sb-text:#a8c8e0;--sb-act:#93c5fd;--sb-hover:rgba(255,255,255,.07);--sb-on:rgba(59,130,246,.18);--sb-sec:#2d5a7a;--sb-div:rgba(255,255,255,.08);--sb-badge-bg:rgba(255,255,255,.08);--sb-badge-on:rgba(59,130,246,.3);--topbar:#fff;--topbar-border:#e2e8f0;--stat-val:#0c1e35;--prog-bg:#e2e8f0;--tchk-border:#cbd5e1;--tchk-bg:#fff;--modal-bg:#fff;--overlay:rgba(10,20,40,.6);--vbtn-bg:#fff;--vbtn-on:#0c1e35;--vbtn-on-text:#fff;--input-bg:#fff;--input-border:#cbd5e1;--done-bg:#f0fdf4;--over-bg:#fff5f5;--ext-ok-bg:#f0fdf4;--ext-wait-bg:#fffbeb;--shadow:rgba(0,0,0,.08);--accent:#3b82f6;--btn-edit-bg:#fff;--btn-edit-border:#cbd5e1;--btn-edit-text:#374151;--btn-del-bg:#fee2e2;--btn-del-border:#fca5a5;--btn-del-text:#7f1d1d;--badge-ok-bg:#dcfce7;--badge-ok-text:#14532d;--badge-ok-border:#86efac;--badge-err-bg:#fee2e2;--badge-err-text:#7f1d1d;--badge-err-border:#fca5a5;--badge-warn-bg:#fff7ed;--badge-warn-text:#7c2d12;--badge-warn-border:#fed7aa}
[data-theme="dark"]{--bg:#131c27;--bg2:#1c2839;--bg3:#1e2d3d;--bg4:#243347;--border:#2a3a4f;--border2:#2e4058;--text:#f1f5f9;--text2:#b8c8d8;--text3:#8aaac4;--sb-bg:#0a1520;--sb-text:#7aaac8;--sb-act:#60a5fa;--sb-hover:rgba(255,255,255,.05);--sb-on:rgba(59,130,246,.15);--sb-sec:#1e4060;--sb-div:rgba(255,255,255,.06);--sb-badge-bg:rgba(255,255,255,.06);--sb-badge-on:rgba(59,130,246,.25);--topbar:#1c2839;--topbar-border:#2a3a4f;--stat-val:#93c5fd;--prog-bg:#2a3a4f;--tchk-border:#2e4058;--tchk-bg:#1e2d3d;--modal-bg:#1c2839;--overlay:rgba(0,5,15,.75);--vbtn-bg:#1e2d3d;--vbtn-on:#93c5fd;--vbtn-on-text:#0a1520;--input-bg:#1e2d3d;--input-border:#2e4058;--done-bg:#0d2418;--over-bg:#2a1515;--ext-ok-bg:#0d2418;--ext-wait-bg:#1c1a00;--shadow:rgba(0,0,0,.4);--accent:#60a5fa;--btn-edit-bg:#1e2d3d;--btn-edit-border:#2e4058;--btn-edit-text:#cbd5e1;--btn-del-bg:#2a1515;--btn-del-border:#7f1d1d;--btn-del-text:#fca5a5;--badge-ok-bg:#0d2e1a;--badge-ok-text:#86efac;--badge-ok-border:#166534;--badge-err-bg:#2d0f0f;--badge-err-text:#fca5a5;--badge-err-border:#7f1d1d;--badge-warn-bg:#2a1500;--badge-warn-text:#fdba74;--badge-warn-border:#92400e}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);transition:background .25s,color .25s;overflow-x:hidden;max-width:100vw}
.wrap{display:flex;min-height:100vh;min-height:100dvh;max-width:100vw;overflow-x:hidden}
.main{flex:1;display:flex;flex-direction:column;min-width:0;max-width:100%;overflow-x:hidden;margin-left:220px;transition:margin-left .3s}
.sidebar{width:220px;flex-shrink:0;background:var(--sb-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;height:100dvh;overflow-y:auto;overflow-x:hidden;transition:background .25s,transform .3s,width .3s;z-index:60;padding-top:env(safe-area-inset-top)}
.sidebar.collapsed{width:0;overflow:hidden}
.main.sb-collapsed{margin-left:0}
.sb-logo{padding:14px 14px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo-title{font-size:14px;font-weight:800;color:#e8f0fe}
.sb-logo-sub{font-size:10px;color:var(--sb-text);font-weight:600;margin-top:1px}
.sb-newbtn{margin:10px 10px 4px;padding:8px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;text-align:center;transition:background .15s;width:calc(100% - 20px)}
.sb-newbtn:hover{background:#1d4ed8}
.sb-section{padding:8px 14px 3px;font-size:9px;font-weight:700;color:var(--sb-text);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
.sb-item{display:flex;align-items:center;gap:7px;padding:7px 14px;border:none;background:none;cursor:pointer;color:var(--sb-text);font-family:inherit;font-weight:600;font-size:12px;text-align:left;transition:background .15s,color .15s;width:100%;border-left:3px solid transparent;flex-shrink:0;min-width:0}
.sb-item:hover{background:var(--sb-hover);color:#c8dff0}
.sb-item.on{background:var(--sb-on);color:var(--sb-act);border-left:3px solid #3b82f6;padding-left:11px}
.sb-badge{flex-shrink:0;background:var(--sb-badge-bg);color:var(--sb-sec);font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto}
.sb-item.on .sb-badge{background:var(--sb-badge-on);color:var(--sb-act)}
.sb-div{height:1px;background:var(--sb-div);margin:6px 14px;flex-shrink:0}
.sb-cats{overflow-y:auto;overflow-x:hidden;flex:1}
.sb-ic{flex:0 0 20px;display:flex;align-items:center;justify-content:center;font-size:12px;overflow:hidden}
.sb-bottom{flex-shrink:0;padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--sb-div);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
.theme-toggle{background:var(--sb-hover);border:1px solid var(--sb-div);border-radius:6px;cursor:pointer;padding:4px 10px;font-size:11px;font-weight:700;color:var(--sb-text);font-family:inherit;transition:all .15s;white-space:nowrap}
.theme-toggle:hover{background:rgba(255,255,255,.12);color:#c8dff0}
.topbar{background:var(--topbar);border-bottom:1px solid var(--topbar-border);padding:9px 14px;padding-top:calc(9px + env(safe-area-inset-top));padding-left:calc(14px + env(safe-area-inset-left));padding-right:calc(14px + env(safe-area-inset-right));display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:40;transition:background .25s;min-width:0;width:100%}
.topbar-title{font-size:14px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hamburger{display:block;background:none;border:none;cursor:pointer;font-size:20px;color:var(--text);padding:2px 6px;flex-shrink:0}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#f1f5f9;padding:9px 18px 9px 14px;border-radius:10px;border-left:3px solid transparent;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s,opacity .3s,border-left-color .15s;opacity:0;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.banner-dringend{margin-bottom:10px;padding:9px 14px;background:var(--badge-err-bg);border:1px solid var(--badge-err-border);border-radius:8px;font-size:12px;font-weight:700;color:var(--badge-err-text);display:flex;align-items:center;gap:6px}
.content{padding:12px 14px;flex:1;min-width:0;width:100%}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--bg2);border-radius:8px;border:1px solid var(--border);padding:9px 12px;transition:background .25s;min-width:0}
.stat-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;font-weight:700}
.stat-val{font-size:20px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center;min-width:0}
.search-wrap{position:relative;flex:1;min-width:140px}
.search-wrap .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:14px}
.search-wrap input{padding-left:28px;width:100%;height:33px;border:1.5px solid var(--input-border);border-radius:7px;background:var(--input-bg);color:var(--text);font-size:13px;font-weight:500;font-family:inherit;transition:background .25s,color .25s}
.search-wrap input:focus{outline:none;border-color:#3b82f6}
.view-toggle{display:flex;border:1.5px solid var(--border2);border-radius:7px;overflow:hidden;flex-shrink:0}
.vbtn{padding:4px 9px;border:none;background:var(--vbtn-bg);cursor:pointer;color:var(--text2);font-size:13px;font-family:inherit;transition:all .15s}
.vbtn.on{background:var(--vbtn-on);color:var(--vbtn-on-text)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.dcard-naam{font-size:13px;font-weight:800;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:50px;color:var(--text)}
.dcard{background:var(--bg2);border-radius:9px;border:1px solid var(--border);display:flex;overflow:hidden;cursor:pointer;position:relative;transition:box-shadow .15s,border-color .15s,background .25s;min-width:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.dcard:hover{box-shadow:0 4px 16px var(--shadow);border-color:#3b82f6}
.dcard.closed{opacity:.45;filter:saturate(.2)}
.daccent{width:4px;flex-shrink:0}
.dbody{padding:9px 11px;flex:1;min-width:0}
.dacts{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity .15s}
.dcard:hover .dacts{opacity:1}
.prog{background:var(--prog-bg);border-radius:3px;height:4px;overflow:hidden;margin-top:5px}
.prog-fill{height:4px;border-radius:3px}
.dlist{display:flex;flex-direction:column;gap:6px;width:100%}
.dlist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:1px solid var(--border);border-radius:9px;background:var(--bg2);cursor:pointer;transition:background .12s;overflow:hidden;gap:12px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.dlist-row:hover{background:var(--bg3)}
.dlist-row.closed{opacity:.45;filter:saturate(.2)}
.dtop{background:var(--bg2);border-radius:9px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;transition:background .25s}
.dinfo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.dinfo{background:var(--bg3);border-radius:6px;padding:7px 10px;border:1px solid var(--border)}
.dinfo-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin-bottom:2px}
.dinfo-val{font-size:12px;font-weight:700;color:var(--text)}
.mini-stats{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.mini-stat{background:var(--bg3);border-radius:6px;padding:6px 12px;border:1px solid var(--border);text-align:center;flex:1;min-width:60px}
.tsectie{background:var(--bg2);border-radius:9px;border:1px solid var(--border);overflow:hidden;transition:background .25s}
.thdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);gap:8px}
.twrap{border:1px solid var(--border);border-radius:8px;margin-bottom:6px;transition:background .25s}
.twrap:last-child{margin-bottom:0}
.twrap.drag-over{outline:2px dashed var(--accent);outline-offset:-2px;background:var(--bg3)!important}
.twrap.dragging{opacity:.4}
.drag-hdl{cursor:grab;color:var(--text3);font-size:15px;padding:0 8px 0 2px;user-select:none;flex-shrink:0;display:flex;align-items:center;touch-action:none}
.twrap.tdone{background:rgba(22,163,74,0.18)}
.twrap.topen{background:rgba(245,158,11,0.18)}
.twrap.tover{background:var(--over-bg)}
.tmain{display:flex;min-width:0}
.tpbar{width:4px;flex-shrink:0}
.tcont{padding:8px 10px;flex:1;min-width:0}
.trow1{display:flex;align-items:flex-start;gap:7px;min-width:0}
.trow-actions{display:flex;gap:3px;flex-shrink:0;align-items:center;margin-top:1px}
.tchk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--tchk-border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:var(--tchk-bg);font-size:10px;transition:all .15s;margin-top:1px}
.tchk.on{background:#16a34a;border-color:#16a34a;color:#fff}
.tmeta{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.exttog{display:flex;align-items:center;gap:6px;padding:7px 10px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;background:none;border:none;border-top:1px dashed var(--border);font-family:inherit;width:100%;transition:background .15s}
.exttog:hover{background:var(--bg3)}
.extblk{padding:6px 10px 8px 10px}
.ext-item{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:6px;background:var(--bg2)}
.ext-item.ok{border-color:var(--badge-ok-border);background:var(--ext-ok-bg)}
.ext-item.wait{border-color:var(--badge-warn-border);background:var(--ext-wait-bg)}
.ext-bar{width:4px;flex-shrink:0}
.ext-bar.ok{background:#16a34a}
.ext-bar.wait{background:#f59e0b}
.ext-body{padding:7px 9px;flex:1;min-width:0}
.ext-naam{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ext-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.ext-actions{display:flex;flex-direction:column;gap:3px;padding:6px 7px;justify-content:center;flex-shrink:0}
.ext-add{padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-top:4px}
.ext-add-toggle{display:inline-flex;align-items:center;gap:5px;background:#2563eb;border:none;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;color:#fff;cursor:pointer;padding:5px 11px;transition:opacity .15s}
.ext-add-toggle:hover{opacity:.85}
.ext-add-form{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ext-add-row{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end}
.ext-add-row select,.ext-add-row input{font-size:12px;border:1.5px solid var(--input-border);border-radius:5px;padding:5px 7px;background:var(--input-bg);font-family:inherit;color:var(--text);font-weight:500;min-width:0}
.ext-add-row select{flex:1;min-width:100px}
.ext-add-row input[type=text]{flex:1;min-width:80px}
.ext-add-row input[type=date]{width:130px;flex-shrink:0}
.ov{display:none;position:fixed;inset:0;background:var(--overlay);z-index:100;align-items:center;justify-content:center;padding:16px}
.ov.show{display:flex}
.ob{background:var(--modal-bg);border-radius:12px;padding:18px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px var(--shadow);transition:background .25s}
.ob-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.fr{margin-bottom:9px}
.fr label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:3px}
.fr input,.fr select,.fr textarea{font-family:inherit;font-size:13px;font-weight:500;border:1.5px solid var(--input-border);border-radius:6px;padding:7px 10px;background:var(--input-bg);color:var(--text);width:100%;transition:background .25s,color .25s}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.f-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.conf-ov{display:none;position:fixed;inset:0;background:var(--overlay);z-index:200;align-items:center;justify-content:center;padding:16px}
.conf-ov.show{display:flex}
.conf-box{background:var(--modal-bg);border-radius:10px;padding:20px;max-width:300px;width:100%;box-shadow:0 12px 40px var(--shadow)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3)}
.empty p{font-size:13px;font-weight:600;margin-top:8px}
.sw{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.btn{cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;border-radius:6px;padding:5px 11px;display:inline-flex;align-items:center;gap:4px;line-height:1;transition:opacity .15s;white-space:nowrap;border:none}
.btn:hover{opacity:.85}
.btn-blue{background:#2563eb;color:#fff}
.btn-white{background:var(--btn-edit-bg);color:var(--btn-edit-text);border:1.5px solid var(--btn-edit-border)}
.btn-red{background:var(--btn-del-bg);color:var(--btn-del-text);border:1.5px solid var(--btn-del-border)}
.btn-green{background:var(--badge-ok-bg);color:var(--badge-ok-text);border:1.5px solid var(--badge-ok-border)}
.btn-sm{font-size:11px;padding:3px 8px}
.fr textarea{resize:none}
#mo-e.ov{z-index:150}
#bg-deco{display:none}
@media(max-width:768px){.sidebar{transform:translateX(-100%);position:fixed;height:100vh;height:100dvh}.sidebar.open{transform:translateX(0)}.sb-overlay.open{display:block}.main{margin-left:0;max-width:100vw}.dgrid{grid-template-columns:1fr}.dinfo-grid{grid-template-columns:repeat(3,1fr)}.stats{grid-template-columns:repeat(3,1fr)}.content{padding:10px 12px}.fr input,.fr select{font-size:16px!important;height:48px;box-sizing:border-box}.fr textarea{font-size:16px!important}.fr input[type=date]{-webkit-appearance:none;appearance:none;text-align:left;padding:0 10px;line-height:48px}.dtop-hdr{flex-direction:column;align-items:flex-start;gap:8px}.dtop-hdr>div:last-child{display:grid!important;grid-template-columns:1fr 1fr;gap:6px;width:100%}.dtop-hdr>div:last-child button{flex:none;min-width:0;width:100%;justify-content:center;min-height:40px}.dtop-hdr>div:last-child button:only-child{grid-column:1/-1}.ob{padding:14px;border-radius:10px}.ov{padding:10px}.trow-actions{flex-wrap:wrap}.topbar{flex-wrap:wrap;gap:6px}.ext-add-row{flex-wrap:wrap}.ext-add-row input[type=date]{width:100%;flex:1}.dlist-row{flex-wrap:wrap}.mini-stats{gap:4px}.mini-stat{min-width:0;padding:5px 8px}.ext-naam{white-space:normal;word-break:break-word}.dcard-naam{white-space:normal;word-break:break-word}.tmeta{gap:3px}.dash-action-grid{grid-template-columns:1fr!important}.dash-kpi-grid{grid-template-columns:repeat(2,1fr)!important}.dcard:hover{box-shadow:none;border-color:var(--border)}.dacts{opacity:1}.dcard:hover .dacts{opacity:1}}
@media(max-width:360px){.stat-val{font-size:17px}.dinfo-grid{grid-template-columns:1fr 1fr}}
/* ===== MOBIEL: touch-targets, leesbaarheid, iOS-zoom ===== */
@media(max-width:768px){
  .trow-actions{gap:6px}
  .trow-actions button{min-width:42px;min-height:42px;font-size:15px;display:inline-flex;align-items:center;justify-content:center}
  .tchk{width:24px;height:24px;font-size:14px}
  .drag-hdl{padding:0 12px 0 4px;font-size:18px}
  button[title="Taak afvinken"]{min-width:42px;min-height:42px;font-size:16px}
  .hamburger{min-width:44px;min-height:44px;padding:0;display:inline-flex;align-items:center;justify-content:center}
  .search-wrap input{height:44px;font-size:16px}
  #login-ov input,#pw-ov input,.ext-add-row input,.ext-add-row select{font-size:16px!important}
  .dcard-naam{font-size:14px}
  .dlist-row [style*="font-family:monospace"]{font-size:12px}
  .stat-lbl,.dinfo-lbl{font-size:10px}
  .dinfo-grid{grid-template-columns:1fr 1fr}
  .dtop-hdr>div:last-child button{min-height:40px}
  .dtools{width:100%;display:grid!important;grid-template-columns:repeat(3,1fr);gap:6px}
  .dtools>button{width:100%;min-height:40px;font-size:12px!important;padding:6px 4px!important}
  .notif-flag-btn{min-width:44px;min-height:44px;font-size:22px}
  .dacts button,.ext-actions button,.ico-acts button,.ico-acts-btn{min-width:42px;min-height:42px;font-size:14px}
}
/* ===== NOTIFICATIES ===== */
.notif-wrap{position:relative;flex-shrink:0}
.notif-flag-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:2px 6px;line-height:1;position:relative;display:inline-flex;align-items:center;border-radius:6px}
.notif-flag-btn:hover{background:var(--bg3)}
.notif-badge{position:absolute;top:-3px;right:-3px;background:#dc2626;color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 4px;min-width:14px;text-align:center;line-height:14px;pointer-events:none}
.notif-panel{position:fixed;top:calc(52px + env(safe-area-inset-top));right:10px;width:320px;max-width:calc(100vw - 20px);background:var(--bg2);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px var(--shadow);z-index:500;max-height:70vh;overflow-y:auto}
.notif-panel-hdr{padding:11px 14px 8px;border-bottom:1px solid var(--border);font-size:12px;font-weight:800;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.notif-sec-hdr{padding:6px 14px 2px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.notif-item{padding:10px 14px;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.notif-item-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.notif-item-sub{font-size:11px;color:var(--text2);margin-bottom:7px}
.notif-item-agenda{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-item-agenda:hover{background:var(--bg3)}
.notif-item-agenda:last-child{border-bottom:none}
.notif-item-acts{display:flex;gap:6px}
.notif-empty{padding:22px 14px;text-align:center;color:var(--text3);font-size:12px}

/* ===== ANIMATIES & TRANSITIONS ===== */
@keyframes mo-in{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
.ov.show .ob,.conf-ov.show .conf-box{animation:mo-in .2s cubic-bezier(.25,.8,.25,1)}
@keyframes sync-pulse{0%,100%{opacity:1}50%{opacity:.28}}
.sync-pulse{animation:sync-pulse 1.5s ease-in-out infinite}
.prog-fill{transition:width .4s ease}
.tchk:active{transform:scale(.75)}
.dinfo,.mini-stat,.ext-item,.conf-box,.notif-panel,.notif-item,.notif-item-agenda{transition:background .25s,border-color .25s}
#toast.t-ok{border-left-color:#22c55e}
#toast.t-err{border-left-color:#f87171}
#toast.t-warn{border-left-color:#fb923c}
/* ===== CATEGORIE PICKER ===== */
.cpick-wrap{position:relative}
.cpick-inp{width:100%;font-family:inherit;font-size:13px;font-weight:500;border:1.5px solid var(--input-border);border-radius:6px;padding:7px 28px 7px 10px;background:var(--input-bg);color:var(--text);cursor:pointer;transition:background .25s,color .25s,border-color .15s;box-sizing:border-box;text-align:left;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cpick-inp:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.cpick-wrap::after{content:'▾';position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text3);font-size:11px}
.cpick-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--modal-bg);border:1.5px solid #3b82f6;border-radius:8px;box-shadow:0 8px 24px var(--shadow);z-index:400;overflow:hidden;animation:mo-in .15s ease}
.cpick-srch{padding:6px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--modal-bg)}
.cpick-srch input{width:100%;font-family:inherit;font-size:12px;border:1.5px solid var(--input-border);border-radius:5px;padding:5px 8px;background:var(--input-bg);color:var(--text);box-sizing:border-box}
.cpick-srch input:focus{outline:none;border-color:#3b82f6}
.cpick-list{max-height:200px;overflow-y:auto}
.cpick-opt{padding:7px 10px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);transition:background .1s}
.cpick-opt:last-child{border-bottom:none}
.cpick-opt:hover{background:var(--bg3)}
.cpick-opt.sel{background:rgba(59,130,246,.1);color:var(--accent)}
.cpick-none{padding:14px;text-align:center;color:var(--text3);font-size:12px}
</style>
</head>

function setCatPicker(id,val){
  var sel=document.getElementById(id);if(sel)sel.value=val;
  var inp=document.getElementById(id+'-display');
  if(inp){var cat=CATS.find(function(c){return c.id===val;});inp.value=cat?cat.label:'';}
}
function openCatPicker(id){
  if(_catPickerActive===id){closeCatPicker();return;}
  closeCatPicker();
  _catPickerActive=id;
  var wrap=document.getElementById(id+'-wrap');if(!wrap)return;
  var drop=document.createElement('div');drop.className='cpick-drop';drop.id=id+'-drop';
  drop.innerHTML='<div class="cpick-srch"><input id="'+id+'-srch" type="text" placeholder="Zoek categorie..." autocomplete="off" oninput="renderCatOpts(\''+id+'\',this.value)"></div><div class="cpick-list" id="'+id+'-list"></div>';
  wrap.appendChild(drop);
  renderCatOpts(id,'');
  setTimeout(function(){
    var sel=document.getElementById(id);
    if(sel&&sel.value){var selEl=document.querySelector('#'+id+'-list .cpick-opt.sel');if(selEl)selEl.scrollIntoView({block:'nearest'});}
    var s=document.getElementById(id+'-srch');if(s)s.focus();
  },50);
}
function renderCatOpts(id,q){
  var list=document.getElementById(id+'-list');var sel=document.getElementById(id);if(!list||!sel)return;
  var lq=(q||'').toLowerCase().trim();
  var filtered=lq?CATS.filter(function(c){return c.label.toLowerCase().indexOf(lq)!==-1||c.id.toLowerCase().indexOf(lq)!==-1;}):CATS;
  if(!filtered.length){list.innerHTML='<div class="cpick-none">Geen categorieën gevonden</div>';return;}
  list.innerHTML=filtered.map(function(c){
    return '<div class="cpick-opt'+(sel.value===c.id?' sel':'')+'" onclick="selectCat(\''+id+'\',\''+c.id+'\')">'
      +'<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+c.color+';flex-shrink:0"></span>'+esc(c.label)+'</div>';
  }).join('');
}
function selectCat(id,val){setCatPicker(id,val);closeCatPicker();}
function closeCatPicker(){
  if(!_catPickerActive)return;
  var drop=document.getElementById(_catPickerActive+'-drop');if(drop)drop.remove();
  _catPickerActive=null;
}

  if(!_catPickerActive)return;

  if(wrap&&!wrap.contains(e.target))closeCatPicker();
},true);
function toast(msg,type){
  var t=document.getElementById('toast');
  t.classList.remove('t-ok','t-err','t-warn','show');
  var auto=type;
  if(!auto){
    if(/^[✓✔]/.test(msg))auto='ok';
    else if(/^❌/.test(msg))auto='err';
    else if(/^⚠/.test(msg))auto='warn';
  }
  if(auto==='ok')t.classList.add('t-ok');
  else if(auto==='err')t.classList.add('t-err');
  else if(auto==='warn')t.classList.add('t-warn');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

function pvInput(){
  var inp=document.getElementById('f-pv');

  var rawBefore=inp.value.slice(0,sel).replace(/[^A-Za-z0-9]/g,'').length;
  var raw=inp.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,16);
  var fmt='',i;
  for(i=0;i<raw.length;i++){
    if(i===2||i===4||i===6)fmt+='.';
    if(i===12)fmt+='/';
    fmt+=raw[i];
  }
  inp.value=fmt;
  var newPos=0,cnt=0;
  for(i=0;i<fmt.length;i++){
    if(fmt[i]!=='.'&&fmt[i]!=='/')cnt++;
    if(cnt===rawBefore){newPos=i+1;break;}
  }
  if(rawBefore===0)newPos=0;
  try{inp.setSelectionRange(newPos,newPos);}catch(e){}
  pvAutoFill();
}

function migrateCats(){

    if(Array.isArray(d.pv_feiten)){d.pv_feiten.forEach(function(f){if(f.categorie&&CAT_MIGRATE[f.categorie]){f.categorie=CAT_MIGRATE[f.categorie];changed=true;}});}
  });

function migratePvFeiten(){
  var changed=false;
  DOS.forEach(function(d){
    if(d.id==='__werk__'||d.id==='__prive__')return;
    if(Array.isArray(d.pv_feiten))return;
    if(!('pv' in d))return;
    if(!d.naam||!d.naam.trim())d.naam=d.pv||'Onbekend';
    d.pv_feiten=[{id:gId(),pv:d.pv||'',categorie:d.categorie||'',datum:d.datum||td(),notitie:''}];
    if(!Array.isArray(d.links))d.links=[];
    delete d.pv;delete d.categorie;
    changed=true;
  });
  DOS.forEach(function(d){
    if(d.id==='__werk__'||d.id==='__prive__')return;
    if(!Array.isArray(d.links))d.links=[];
    if(!Array.isArray(d.pv_feiten))d.pv_feiten=[];

  var vrij=document.getElementById('xvrij-'+did+'-'+ti);
  if(!sel||!vrij)return;
  if(sel.value==='__vrij__'){vrij.style.display='block';vrij.focus();}else{vrij.style.display='none';vrij.value='';}
}
function exportJSON(){
  function doDownload(ag,rst){
    var data=JSON.stringify({datum:new Date().toISOString(),versie:2,dossiers:DOS,agenda:ag,rooster:rst},null,2);
    var blob=new Blob([data],{type:'application/json'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='mijn-dossiers-backup.json';a.click();URL.revokeObjectURL(url);
  }
  if(_db){
    var agPath=_uid?'gebruikers/'+_uid+'/agenda':'agenda';
    var rstPath=_uid?'gebruikers/'+_uid+'/rooster':'rooster';
    Promise.all([_db.ref(agPath).once('value'),_db.ref(rstPath).once('value')]).then(function(snaps){
      var ag=snaps[0].val()?Object.values(snaps[0].val()):[];
      var rst=snaps[1].val()?Object.values(snaps[1].val()):[];
      doDownload(ag,rst);
    }).catch(function(){doDownload([],[]);});
  }else{doDownload([],[]);}
}
function importJSON(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        var arr=data.dossiers||data;
        if(!Array.isArray(arr))throw new Error('Ongeldig formaat');
        arr=arr.filter(function(d){return d&&typeof d==='object'&&d.id;});
        if(!arr.length)throw new Error('Geen geldige dossiers gevonden');
        var agArr=Array.isArray(data.agenda)?data.agenda:[];
        var rstArr=Array.isArray(data.rooster)?data.rooster:[];
        var msg=arr.length+' dossier(s)';
        if(agArr.length)msg+=', '+agArr.length+' agenda-afspraak/afspraken';
        if(rstArr.length)msg+=', '+rstArr.length+' rooster-item(s)';
        var hadGedeeld=false;
        arr.forEach(function(d){
          if(d.gedeeld){hadGedeeld=true;delete d.gedeeld;delete d.eigenaar_uid;delete d.toegang;}
        });
        if(hadGedeeld)msg+=' (gedeelde dossiers worden als privé geïmporteerd)';
        ask('Backup importeren?',msg+' worden ingeladen. Bestaande data wordt overschreven.',function(){
          if(hadGedeeld)toast('⚠️ Gedeelde dossiers zijn geïmporteerd als privé');
          _priveDOS=arr.filter(function(d){return !d.gedeeld;});
          DOS=_priveDOS.concat(_gedeeldDOS);sv();render();
          if(_db){
            var agPath=_uid?'gebruikers/'+_uid+'/agenda':'agenda';
            var rstPath=_uid?'gebruikers/'+_uid+'/rooster':'rooster';
            if(agArr.length){var agObj={};agArr.forEach(function(ev){if(ev.id)agObj[ev.id]=ev;});_db.ref(agPath).set(agObj);}
            if(rstArr.length){var rstObj={};rstArr.forEach(function(r){if(r.id)rstObj[r.id]=r;});_db.ref(rstPath).set(rstObj);}
          }
          toast('Backup ingeladen');
        });
      }catch(err){toast('Fout bij laden: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function fil(q){
  var l=DOS.filter(function(d){return d.id!=='__werk__'&&d.id!=='__prive__';});
  if(FS==='open')l=l.filter(function(d){return !d.gesloten;});
  if(FS==='gesloten')l=l.filter(function(d){return d.gesloten;});
  if(FC)l=l.filter(function(d){return (d.pv_feiten||[]).some(function(f){return f.categorie===FC;});});
  var query=(q!==undefined?String(q):(document.getElementById('srch')?document.getElementById('srch').value:'')).toLowerCase().trim();
  if(query)l=l.filter(function(d){
    if((d.naam||'').toLowerCase().indexOf(query)!==-1)return true;
    if((d.dossiernummer||'').toLowerCase().indexOf(query)!==-1)return true;
    if((d.pv_feiten||[]).some(function(f){return f.pv.toLowerCase().indexOf(query)!==-1;}))return true;
    return (d.taken||[]).some(function(t){return (t.titel||'').toLowerCase().indexOf(query)!==-1;});
  });
  l.sort(function(a,b){var da=new Date(a.datum||'2000-01-01'),db=new Date(b.datum||'2000-01-01');return SO==='asc'?da-db:db-da;});
  return l;
}

    document.querySelector('.main').classList.toggle('sb-collapsed',SB_COLLAPSED);

}

function initDrag(did){
  var items=document.querySelectorAll('.twrap[draggable]');
  var dragSrc=null;
  items.forEach(function(el){
    el.addEventListener('dragstart',function(e){
      dragSrc=el;
      e.dataTransfer.effectAllowed='move';
      setTimeout(function(){el.classList.add('dragging');},0);
    });
    el.addEventListener('dragend',function(){
      el.classList.remove('dragging');
      document.querySelectorAll('.twrap').forEach(function(x){x.classList.remove('drag-over');});
    });
    el.addEventListener('dragover',function(e){
      e.preventDefault();
      document.querySelectorAll('.twrap').forEach(function(x){x.classList.remove('drag-over');});
      if(el!==dragSrc)el.classList.add('drag-over');
    });
    el.addEventListener('drop',function(e){
      e.preventDefault();
      if(!dragSrc||dragSrc===el)return;
      var si=parseInt(dragSrc.getAttribute('data-ti'));
      var di=parseInt(el.getAttribute('data-ti'));
      var d=DOS.find(function(x){return x.id===did;});
      if(!d)return;
      var moved=d.taken.splice(si,1)[0];
      d.taken.splice(di,0,moved);
      sv();opD(did);
    });
  });
  var touchSrc=null,touchSrcIdx=null,longTimer=null,dragActive=false;
  function cancelTouch(){
    if(longTimer){clearTimeout(longTimer);longTimer=null;}
    if(touchSrc)touchSrc.classList.remove('dragging');
    document.querySelectorAll('.twrap').forEach(function(x){x.classList.remove('drag-over');});
    touchSrc=null;touchSrcIdx=null;dragActive=false;
  }
  items.forEach(function(el){
    el.addEventListener('touchstart',function(e){
      touchSrc=el;touchSrcIdx=parseInt(el.getAttribute('data-ti'));dragActive=false;
      longTimer=setTimeout(function(){
        dragActive=true;
        el.classList.add('dragging');
        if(navigator.vibrate)navigator.vibrate(40);
      },400);
    },{passive:true});
    el.addEventListener('touchmove',function(e){
      if(!dragActive){clearTimeout(longTimer);longTimer=null;return;}
      e.preventDefault();
      var t=e.touches[0],over=document.elementFromPoint(t.clientX,t.clientY);
      var tw=over&&over.closest('.twrap[draggable]');
      document.querySelectorAll('.twrap').forEach(function(x){x.classList.remove('drag-over');});
      if(tw&&tw!==touchSrc)tw.classList.add('drag-over');
    },{passive:false});
    el.addEventListener('touchend',function(e){
      if(dragActive){
        document.querySelectorAll('.twrap').forEach(function(x){x.classList.remove('drag-over');});
        var t=e.changedTouches[0],over=document.elementFromPoint(t.clientX,t.clientY);
        var tw=over&&over.closest('.twrap[draggable]');
        if(tw&&tw!==touchSrc){

function isInactief(d){
  if(d.gesloten||d.id==='__werk__'||d.id==='__prive__')return false;
  if((d.taken||[]).some(function(t){return !t.gedaan;}))return false;
  var dag30=new Date(Date.now()-30*24*60*60*1000);
  var lat=new Date(d.datum||'2000-01-01');
  (d.taken||[]).forEach(function(t){var dt=new Date(t.gedaan_op||t.datum||'2000-01-01');if(dt>lat)lat=dt;});
  return lat<dag30;
}

function saveDos(){
  var naam=document.getElementById('f-naam').value.trim().toUpperCase();
  var datum=document.getElementById('f-datum').value;
  var notitie=document.getElementById('f-not').value.trim();
  var dosnr=document.getElementById('f-dosnr').value.trim();
  if(!naam){document.getElementById('f-naam').focus();return;}
  if(dosnr&&!/^[0-9]{4}\/[0-9]{4}$/.test(dosnr)){toast('⚠️ Dossiernummer moet het formaat YYYY/NNNN hebben (bijv. 2026/0042)');document.getElementById('f-dosnr').focus();return;}
  if(MDI===null){
    var pv=document.getElementById('f-pv').value.trim().toUpperCase();
    var cat=document.getElementById('f-cat').value;
    var fdatVan=document.getElementById('f-fdat-van').value||datum;
    var fdatTot=document.getElementById('f-fdat-tot').value||'';
    if(!pv){document.getElementById('f-pv').focus();return;}
    var allPvs=[];DOS.forEach(function(x){(x.pv_feiten||[]).forEach(function(f){allPvs.push(f.pv);});});
    if(allPvs.indexOf(pv)>=0){toast('PV-nummer bestaat al in een ander dossier');document.getElementById('f-pv').focus();return;}
    var nieuw={id:gId(),naam:naam,datum:datum,notitie:notitie,pv_feiten:[{id:gId(),pv:pv,categorie:cat,datum_van:fdatVan,datum_tot:fdatTot,notitie:''}],links:[],taken:[],gesloten:false};
    if(dosnr)nieuw.dossiernummer=dosnr;
    DOS.unshift(nieuw);
  }else{
    var d=DOS.find(function(x){return x.id===MDI;});
    if(d){Object.assign(d,{naam:naam,datum:datum,notitie:notitie});if(dosnr)d.dossiernummer=dosnr;else delete d.dossiernummer;}
  }
  sv();CM('mo-d');render();toast('Dossier opgeslagen');
}
function feitPvInput(){
  var inp=document.getElementById('ff-pv');if(!inp)return;
  var sel=inp.selectionStart;
  var rawBefore=inp.value.slice(0,sel).replace(/[^A-Za-z0-9]/g,'').length;
  var raw=inp.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,16);
  var fmt='',i;
  for(i=0;i<raw.length;i++){if(i===2||i===4||i===6)fmt+='.';if(i===12)fmt+='/';fmt+=raw[i];}
  inp.value=fmt;
  var newPos=0,cnt=0;
  for(i=0;i<fmt.length;i++){if(fmt[i]!=='.'&&fmt[i]!=='/')cnt++;if(cnt===rawBefore){newPos=i+1;break;}}
  if(rawBefore===0)newPos=0;
  try{inp.setSelectionRange(newPos,newPos);}catch(e){}
  var hint=document.getElementById('ff-pv-hint');
  var catSel=document.getElementById('ff-cat');
  if(!fmt){if(hint)hint.textContent='';return;}
  var valid=/^[A-Za-z]{2}\.[0-9]{2}\.[A-Za-z0-9]{2}\.[0-9]{6}\/[0-9]{4}$/.test(fmt);
  if(!valid){if(hint){hint.textContent='! Verwacht: HV.20.L8.002244/2026';hint.style.color='#dc2626';}return;}
  if(hint){hint.textContent='✓ OK';hint.style.color='#16a34a';}
  var m=fmt.match(/^[A-Z]{2}\.([0-9]{2})/);
  if(m&&catSel){var base=m[1];for(var j=0;j<catSel.options.length;j++){if(catSel.options[j].value===base||catSel.options[j].value.indexOf(base)===0){catSel.value=catSel.options[j].value;setCatPicker('ff-cat',catSel.value);break;}}}
}

function saveF(){
  var pv=document.getElementById('ff-pv').value.trim().toUpperCase();
  var cat=document.getElementById('ff-cat').value;
  var datVan=document.getElementById('ff-dat-van').value;
  var datTot=document.getElementById('ff-dat-tot').value;
  var not=document.getElementById('ff-not').value.trim();
  if(!pv){document.getElementById('ff-pv').focus();return;}
  if(!datVan){document.getElementById('ff-dat-van').focus();return;}
  if(datTot&&datTot<datVan){toast('⚠️ Einddatum moet na de begindatum liggen');document.getElementById('ff-dat-tot').focus();return;}
  var allPvs=[];
  DOS.forEach(function(x){
    var skip=(x.id===MFD&&MFI!==null);
    if(!skip)(x.pv_feiten||[]).forEach(function(f){allPvs.push(f.pv);});
    else (x.pv_feiten||[]).forEach(function(f,i){if(i!==MFI)allPvs.push(f.pv);});
  });
  if(allPvs.indexOf(pv)>=0){toast('⚠️ Dit PV-nummer bestaat al in een ander dossier');return;}
  var d=DOS.find(function(x){return x.id===MFD;});if(!d)return;
  if(!Array.isArray(d.pv_feiten))d.pv_feiten=[];
  if(MFI===null){d.pv_feiten.push({id:gId(),pv:pv,categorie:cat,datum_van:datVan,datum_tot:datTot,notitie:not});}
  else{Object.assign(d.pv_feiten[MFI],{pv:pv,categorie:cat,datum_van:datVan,datum_tot:datTot,notitie:not});}
  if(d.gedeeld){
    if(MFI===null&&d.pv_feiten.length>0)Object.assign(d.pv_feiten[d.pv_feiten.length-1],metaStamp());
    else if(MFI!==null&&d.pv_feiten[MFI])Object.assign(d.pv_feiten[MFI],metaStamp());
  }
  sv();CM('mo-f');render();toast('Feit opgeslagen');
}

  ask('Feit verwijderen?','"'+(f&&f.pv||'?')+'" wordt verwijderd.',function(){d.pv_feiten.splice(+fi,1);sv();render();toast('Feit verwijderd');});
}

  else{sub=(ve&&ve.value||'').trim();}
  sub=sub||'';if((cat==='or'||cat==='andere')&&!sub){toast('Vul een naam/omschrijving in');return;}
  var aa=document.getElementById('e-aa').value,on=document.getElementById('e-on').value;
  var d=DOS.find(function(x){return x.id===MED;});
  if(d&&d.taken[MET]&&d.taken[MET].extern&&d.taken[MET].extern[MEI]!=null){
    Object.assign(d.taken[MET].extern[MEI],{cat:cat,sub:sub,aanvraag:aa,ontvangen:on});
    if(d.gedeeld)Object.assign(d.taken[MET].extern[MEI],metaStamp());
    sv();CM('mo-e');toast('Factor opgeslagen');render();if(EXT_MODAL.did)openExtModal(EXT_MODAL.did,EXT_MODAL.ti);
  }
}

var THEME=localStorage.getItem('dos_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
function applyTheme(t){THEME=t;document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'');localStorage.setItem('dos_theme',t);var btn=document.getElementById('theme-toggle');if(btn)btn.innerHTML=t==='dark'?'\u2600 Licht':'\u263e Donker';}
function toggleTheme(){applyTheme(THEME==='dark'?'light':'dark');}
document.documentElement.setAttribute('data-theme',THEME==='dark'?'dark':'');

// Koppel modal event handlers

document.addEventListener('DOMContentLoaded',function(){
  function bindPvKd(id,fn){
    var inp=document.getElementById(id);
    if(inp){
      inp.addEventListener('keydown',function(e){
        if(e.key==='Backspace'&&!e.ctrlKey&&!e.metaKey&&inp.selectionStart===inp.selectionEnd){
          var s=inp.selectionStart,v=inp.value;
          if(s>0&&/[.\/]/.test(v[s-1])){e.preventDefault();inp.value=v.slice(0,s-2)+v.slice(s);inp.setSelectionRange(s-2,s-2);fn();}
        }
      });
    }
  }
  bindPvKd('f-pv',pvInput);
  bindPvKd('ff-pv',feitPvInput);
});

// ===== NOTIFICATIES =====
var _uitnodigingen={},_uitnodigingenRef=null,_agendaToday=[];

function countNotif(){
  var uitnCount=Object.keys(_uitnodigingen).length;
  var today=td();
  var agCount=_agendaToday.filter(function(a){return !localStorage.getItem('notif-agenda-'+a.id+'-'+today);}).length;
  return uitnCount+agCount;
}
function updateNotifBadge(){
  var btn=document.querySelector('.notif-flag-btn');if(!btn)return;
  var count=countNotif();
  var badge=btn.querySelector('.notif-badge');
  if(count>0){
    if(!badge){badge=document.createElement('span');badge.className='notif-badge';btn.appendChild(badge);}
    badge.textContent=count>9?'9+':count;
  }else{if(badge)badge.remove();}
}
function toggleNotifPanel(){
  var p=document.getElementById('notif-panel'),ov=document.getElementById('notif-panel-ov');if(!p)return;
  if(p.style.display==='none'||!p.style.display){renderNotifPanel();p.style.display='block';ov.style.display='block';}
  else{p.style.display='none';ov.style.display='none';}
}
function closeNotifPanel(){
  var p=document.getElementById('notif-panel'),ov=document.getElementById('notif-panel-ov');
  if(p)p.style.display='none';if(ov)ov.style.display='none';
}
function renderNotifPanel(){
  var p=document.getElementById('notif-panel');if(!p)return;
  var today=td();
  var uitnKeys=Object.keys(_uitnodigingen);
  var agOngelezen=_agendaToday.filter(function(a){return !localStorage.getItem('notif-agenda-'+a.id+'-'+today);});
  var html='<div class="notif-panel-hdr"><span>🚩 Meldingen</span>'
    +'<button onclick="closeNotifPanel()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);line-height:1;padding:0 2px">×</button></div>';
  if(!uitnKeys.length&&!agOngelezen.length){
    html+='<div class="notif-empty">Geen nieuwe meldingen</div>';
  }else{
    if(uitnKeys.length){
      html+='<div class="notif-sec-hdr">Gedeelde dossiers</div>';
      uitnKeys.forEach(function(key){
        var inv=_uitnodigingen[key];
        html+='<div class="notif-item">'
          +'<div class="notif-item-title">📂 '+esc(inv.dossier_naam||inv.dossier_id)+'</div>'
          +'<div class="notif-item-sub">'+esc(inv.van_naam||'Collega')+' wil dit dossier met je delen</div>'
          +'<div class="notif-item-acts">'
          +'<button onclick="accepteerUitnodiging(\''+key+'\')" style="background:#16a34a;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">✓ Accepteren</button>'
          +'<button onclick="weigerUitnodiging(\''+key+'\')" style="background:var(--btn-del-bg);color:var(--btn-del-text);border:1px solid var(--btn-del-border);border-radius:6px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">✗ Weigeren</button>'
          +'</div></div>';
      });
    }
    if(agOngelezen.length){
      html+='<div class="notif-sec-hdr">Vandaag op agenda</div>';
      agOngelezen.forEach(function(a){
        html+='<div class="notif-item-agenda" onclick="dismissAgendaNotif(\''+esc(a.id)+'\')">'
          +'<div class="notif-item-title">📅 '+esc(a.titel)+'</div>'
          +'<div class="notif-item-sub">'+(a.tijdstip?esc(a.tijdstip)+(a.locatie?' — '+esc(a.locatie):''):'Hele dag')+'</div>'
          +'</div>';
      });
    }
  }
  p.innerHTML=html;
}
function accepteerUitnodiging(inviteId){
  var inv=_uitnodigingen[inviteId];if(!inv)return;
  _db.ref('gedeeld/'+inv.dossier_id).once('value').then(function(snap){
    if(!snap.val()){toast('❌ Dossier niet gevonden.');return Promise.reject('not found');}
    var updates={};
    updates['gedeeld/'+inv.dossier_id+'/toegang/'+_uid]=true;
    updates['gedeeld/'+inv.dossier_id+'/toegang_namen/'+_uid]=_userName||_userEmail;
    updates['uitnodigingen/'+_uid+'/'+inviteId]=null;
    return _db.ref().update(updates);
  }).then(function(){
    toast('✓ Dossier toegevoegd aan je overzicht');closeNotifPanel();
  }).catch(function(e){if(e!=='not found')toast('❌ Fout bij accepteren. Probeer opnieuw.');});
}
function weigerUitnodiging(inviteId){
  _db.ref('uitnodigingen/'+_uid+'/'+inviteId).remove()
    .then(function(){toast('Uitnodiging geweigerd');closeNotifPanel();})
    .catch(function(){toast('❌ Fout. Probeer opnieuw.');});
}
function dismissAgendaNotif(id){
  var today=td();
  try{localStorage.setItem('notif-agenda-'+id+'-'+today,'1');}catch(e){}
  updateNotifBadge();renderNotifPanel();
}

// RAF-batching: meerdere render()-aanroepen in één frame worden samengevoegd
(function(){var _orig=render;render=function(){if(_renderRAF)cancelAnimationFrame(_renderRAF);_renderRAF=requestAnimationFrame(function(){_renderRAF=null;_orig();});};})();

// Escape sluit open modals | Ctrl+F opent globale zoek
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    var open=document.querySelector('.ov.show');
    if(open&&open.id){CM(open.id);return;}
    closeCatPicker();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();openGlobSrch();}
});


function openGlobSrch(){
  OM('mo-globsrch');
  setTimeout(function(){
    var el=document.getElementById('globsrch-inp');
    if(el){el.value='';el.focus();}
    document.getElementById('globsrch-res').innerHTML='<div style="padding:24px;text-align:center;font-size:13px;font-weight:600;color:var(--text3)">Begin te typen...</div>';
  },80);
}

function onGlobSrch(){
  var q=(document.getElementById('globsrch-inp').value||'').toLowerCase().trim();
  var res=document.getElementById('globsrch-res');
  if(!q){res.innerHTML='<div style="padding:24px;text-align:center;font-size:13px;font-weight:600;color:var(--text3)">Begin te typen...</div>';return;}
  var hits=[];
  DOS.forEach(function(d){
    if(d.id==='__werk__'||d.id==='__prive__')return;
    var fields=[d.naam,d.id,(d.pv_feiten||[]).map(function(p){return p.pv;}).join(' '),d.notitie,(d.categorieen||[]).join(' ')];
    if(fields.some(function(f){return (f||'').toLowerCase().indexOf(q)!==-1;})){
      hits.push({type:'dos',d:d});
    }
    (d.taken||[]).forEach(function(t){
      if((t.titel||'').toLowerCase().indexOf(q)!==-1||(t.notitie||'').toLowerCase().indexOf(q)!==-1||(t.npv||'').toLowerCase().indexOf(q)!==-1){
        hits.push({type:'taak',d:d,t:t});
      }
    });
  });
  if(!hits.length){res.innerHTML='<div style="padding:24px;text-align:center;font-size:13px;color:var(--text3)">Geen resultaten gevonden.</div>';return;}
  var h='';
  hits.slice(0,30).forEach(function(hit){
    if(hit.type==='dos'){
      h+='<div onclick="CM(\'mo-globsrch\');opD(\''+esc(hit.d.id)+'\')" style="padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'">'
        +'<span style="font-size:15px">📁</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(hit.d.naam||hit.d.id)+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+esc((hit.d.pv_feiten&&hit.d.pv_feiten[0]&&hit.d.pv_feiten[0].pv)||gcFirst(hit.d)||'')+(hit.d.gesloten?' · Gesloten':'')+'</div>'
        +'</div>'
        +'<span style="font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:5px">Dossier</span>'
        +'</div>';
    } else {
      h+='<div onclick="CM(\'mo-globsrch\');opD(\''+esc(hit.d.id)+'\');VW=\'detail\';render()" style="padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'">'
        +'<span style="font-size:15px">'+(hit.t.gedaan?'✅':'⬜')+'</span>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(hit.t.titel||'(geen titel)')+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+esc(hit.d.naam||hit.d.id)+'</div>'
        +'</div>'
        +'<span style="font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:2px 7px;border-radius:5px">Taak</span>'
        +'</div>';
    }
  });
  if(hits.length>30)h+='<div style="padding:10px 16px;font-size:12px;color:var(--text3);text-align:center">+'+( hits.length-30)+' meer resultaten — typ specifieker</div>';
  res.innerHTML=h;
}

// Start app: laad lokale data meteen, Firebase asynchroon
(function waitForFirebase(tries){
  tries=tries||0;
  if(window._fbLoadErr||tries>30){initFB();return;}
  if(typeof firebase!=='undefined'){initAuth();return;}
  setTimeout(function(){waitForFirebase(tries+1);},100);
})();
window.addEventListener('load',function(){
  if(typeof firebase!=='undefined'&&!_uid){initAuth();}
});

</script>
